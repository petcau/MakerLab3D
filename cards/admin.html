<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MakerLab 3D — Painel</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="header">
    <div class="header-logo">MAKER<span>LAB</span> 3D</div>
    <div class="header-tabs">
      <button class="tab-btn active" id="tab-cards" onclick="switchTab('cards')">🃏 Cards</button>
      <button class="tab-btn" id="tab-trilhas" onclick="switchTab('trilhas')">🗺️ Trilhas</button>
    </div>
    <div class="header-sub" id="header-sub">Painel de Cards</div>
  </div>

  <!-- ABA CARDS -->
  <div id="view-cards" class="tab-view">
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Cards</span>
          <button class="btn-novo" onclick="novoCard()">+ Novo Card</button>
        </div>
        <div class="card-list" id="card-list">
          <div class="list-loading">Carregando cards...</div>
        </div>
      </div>
      <div class="main" id="main-content">
        <div class="empty-state">
          <div class="empty-state-icon">🃏</div>
          <p>Selecione um card na lista<br>ou crie um novo para começar.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ABA TRILHAS -->
  <div id="view-trilhas" class="tab-view" style="display:none;">
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Trilhas</span>
          <button class="btn-novo" onclick="novaTrilha()">+ Nova Trilha</button>
        </div>
        <div class="card-list" id="trilha-list">
          <div class="list-loading">Carregando trilhas...</div>
        </div>
      </div>
      <div class="main" id="trilha-content">
        <div class="empty-state">
          <div class="empty-state-icon">🗺️</div>
          <p>Selecione uma trilha na lista<br>ou crie uma nova para começar.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module" src="admin.js"></script>
  <script type="module" src="admin-trilhas.js"></script>
</body>
</html>
