<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desarmar a Bomba | MakerLab 3D</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bomba.css">
</head>
<body>

  <div class="q-header">
    <div class="q-logo">MAKER<span>LAB</span> 3D</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="q-card-nome" id="q-card-nome">Carregando...</div>
      <button onclick="voltarCard()" style="background:#2F3447;color:#fff;border:none;border-radius:10px;padding:6px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;">← Voltar</button>
    </div>
  </div>

  <div class="player-card" id="player-card" style="display:none;">
    <img class="player-avatar" id="player-avatar" src="../assets/robo 1_transparente.png" alt="Avatar">
    <div class="player-info">
      <div class="player-jogo" id="player-jogo">Desarmar a Bomba</div>
      <div class="player-nome" id="player-nome">—</div>
      <div class="player-escola" id="player-escola"></div>
      <div class="player-nivel" id="player-nivel">Nível 1</div>
    </div>
    <div class="player-pts-box">
      <div class="player-pts-val" id="player-pts">0</div>
      <div class="player-pts-label">Pontos<br>acumulados</div>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Carregando jogo...
  </div>

  <!-- Game Box -->
  <div class="bm-box" id="bm-box" style="display:none;">

    <!-- Timer + Bomb + Wires em uma linha -->
    <div class="bm-top-row">
      <div class="bm-timer-block" id="bm-timer-wrap">
        <div class="bm-timer-label">⏱ TEMPO</div>
        <div class="bm-timer" id="bm-timer">
          <span id="bm-timer-val">01:00</span>
        </div>
      </div>
      <div class="bm-bomb-emoji" id="bm-bomba-emoji">💣</div>
      <div class="bm-fios" id="bm-fios"></div>
    </div>

    <!-- Current challenge -->
    <div class="bm-desafio-wrap">
      <div class="bm-codigo-num" id="bm-num">CÓDIGO 1 DE 4</div>
      <div class="bm-challenge">
        <div class="bm-val-box">
          <div class="bm-valor" id="bm-valor">F</div>
          <div class="bm-sistema" id="bm-de">HEX</div>
        </div>
        <div class="bm-arrow">→</div>
        <div class="bm-input-box">
          <input class="bm-input" id="bm-input" type="text"
                 autocomplete="off" autocapitalize="characters"
                 placeholder="?" readonly>
          <div class="bm-sistema bm-sistema-alvo" id="bm-para">DECIMAL</div>
        </div>
        <button class="bm-btn" onclick="confirmarResposta()">Confirmar</button>
      </div>
      <div class="bm-feedback" id="bm-feedback" style="display:none;"></div>
    </div>

    <!-- Binary board (visível quando source=binario) -->
    <div class="bm-board-wrap" id="bm-board-wrap" style="display:none;">
      <div class="ps-board" id="bm-board"></div>
    </div>

    <!-- Tabela de Referência Alphabet Code -->
    <div class="ps-tabela-wrap bm-tabela-wrap">
      <div class="ps-tabela" id="bm-tabela"></div>
    </div>

  </div>

  <!-- Tela Final -->
  <div class="tela-final" id="tela-final" style="display:none;">
    <div class="tela-final-box">
      <div class="tf-top" id="tf-top">
        <div class="tf-top-row">
          <div class="tf-emoji" id="tf-emoji">💣</div>
          <div class="tf-top-text">
            <div class="tf-titulo" id="tf-titulo">Resultado</div>
            <div class="tf-sub" id="tf-sub"></div>
          </div>
        </div>
      </div>
      <div class="tf-body">
        <div id="tf-badge-concluido" style="display:none;text-align:center;margin-bottom:16px;">
          <span style="background:#f0fdf4;border:1.5px solid #a7f3d0;color:#15803d;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;padding:6px 18px;border-radius:20px;">✅ Desafio Concluído!</span>
        </div>
        <div class="tf-avatar-wrap">
          <img class="tf-avatar" id="tf-avatar" src="../assets/robo 1_transparente.png" alt="">
        </div>
        <div class="res-grid">
          <div class="res-item rac">
            <div class="res-val" id="res-ac">0</div>
            <div class="res-label">Códigos<br>Desarmados</div>
          </div>
          <div class="res-item rer">
            <div class="res-val" id="res-er">0</div>
            <div class="res-label">Códigos<br>Falhados</div>
          </div>
          <div class="res-item rpt">
            <div class="res-val" id="res-pt">0</div>
            <div class="res-label">Pontos</div>
          </div>
        </div>
        <p class="res-msg" id="res-msg"></p>
        <p style="text-align:center;font-size:13px;font-weight:700;margin-bottom:16px;" id="tf-tentativas-restantes"></p>
        <button class="btn-tentar" onclick="reiniciar()">🔄 Tentar Novamente</button>
        <div style="height:10px;"></div>
        <button class="btn-voltar" onclick="voltarCard()">← Voltar ao Card</button>
      </div>
    </div>
  </div>

  <script type="module" src="bomba.js"></script>
</body>
</html>
